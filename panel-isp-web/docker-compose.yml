services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: panel_isp_web
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    networks:
      - panel_isp_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  panel_isp_network:
    driver: bridge
